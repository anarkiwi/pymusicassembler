name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src/pymusicassembler tests scripts
      - name: pylint
        run: pylint src/pymusicassembler tests scripts
      - name: Cache HVSC tunes
        # HVSC tunes are copyright and never committed; the corpus/player tests
        # fetch them from the mirror into a gitignored cache.  Cache that dir
        # across runs, keyed on the corpus list + fetch script so a changed
        # sample invalidates it.
        uses: actions/cache@v4
        with:
          path: tests/.tunecache
          key: hvsc-tunes-${{ hashFiles('tests/fixtures/ma_corpus.txt', 'scripts/fetch_tunes.py') }}
      - name: pytest + coverage (> 85%)
        # Tunes are HVSC copyright works (never committed); CI has no
        # SIDTRACE_BIN, so the byte-exact player tests validate against the
        # committed frozen oracle grids, and tune-dependent tests fetch from
        # the HVSC mirror into the cached tunecache (retrying transient
        # failures; skipping an individual tune only if truly unreachable).
        run: pytest -n auto --cov=pymusicassembler --cov-report=term-missing --cov-fail-under=85

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          python -c "import pymusicassembler; print(pymusicassembler.__version__)"
          pymusicassembler --help
