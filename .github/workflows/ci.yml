name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # TODO: switch to PyPI once pysidtracker is published
          pip install "pysidtracker @ git+https://github.com/anarkiwi/pysidtracker@main"
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src/pymusicassembler tests scripts
      - name: pylint
        run: pylint src/pymusicassembler tests scripts
      - name: pytest + coverage (> 85%)
        # Tunes are HVSC copyright works (never committed); CI has no
        # SIDTRACE_BIN, so the byte-exact player tests validate against the
        # committed frozen oracle grids, and tune-dependent tests fetch from
        # the HVSC mirror (skipping cleanly if the mirror is unreachable).
        run: pytest --cov=pymusicassembler --cov-report=term-missing --cov-fail-under=85

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke test the wheel
        run: |
          # TODO: switch to PyPI once pysidtracker is published
          pip install "pysidtracker @ git+https://github.com/anarkiwi/pysidtracker@main"
          pip install dist/*.whl
          python -c "import pymusicassembler; print(pymusicassembler.__version__)"
          pymusicassembler --help
